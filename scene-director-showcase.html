<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Scene Director Showcase</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow: hidden; background: #070a0f; font-family: Pretendard, -apple-system, sans-serif; }
        .shot {
            position: relative;
            width: 1080px;
            height: 1080px;
            padding: 54px;
            background:
                radial-gradient(circle at 72% 18%, rgba(87, 135, 255, .28), transparent 30%),
                radial-gradient(circle at 18% 84%, rgba(181, 125, 54, .18), transparent 32%),
                linear-gradient(145deg, #131923 0%, #070a0f 100%);
            color: #fff;
        }
        .brandline {
            position: absolute;
            top: 52px;
            left: 58px;
            right: 58px;
            z-index: 4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255,255,255,.62);
            font-size: 17px;
            letter-spacing: .08em;
        }
        .brandline b { color: #fff; font-weight: 500; letter-spacing: 0; }
        .app {
            position: absolute;
            left: 54px;
            right: 54px;
            bottom: 58px;
            height: 828px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 28px;
            background: rgba(10,14,21,.9);
            box-shadow: 0 52px 110px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
        }
        .bar {
            height: 72px;
            display: grid;
            grid-template-columns: 220px 1fr 210px;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.035);
        }
        .bar b { font-size: 22px; font-weight: 500; }
        .bar span { justify-self: center; color: rgba(255,255,255,.42); font-size: 16px; }
        .bar i {
            justify-self: end;
            padding: 11px 18px;
            border: 1px solid rgba(117,167,255,.28);
            border-radius: 999px;
            color: #a8c5ff;
            font-size: 15px;
            font-style: normal;
        }
        .workspace {
            display: grid;
            grid-template-columns: 196px 1fr 210px;
            height: calc(100% - 72px);
        }
        .side {
            padding: 26px 24px;
            background: rgba(255,255,255,.035);
        }
        .left { border-right: 1px solid rgba(255,255,255,.08); }
        .right { border-left: 1px solid rgba(255,255,255,.08); }
        .label {
            display: block;
            margin-bottom: 18px;
            color: rgba(255,255,255,.34);
            font-size: 13px;
            letter-spacing: .16em;
            text-transform: uppercase;
        }
        .row {
            padding: 17px 0;
            border-top: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.56);
            font-size: 16px;
        }
        .row.active { color: #fff; }
        .canvas {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(0deg, rgba(84,116,151,.18) 0 1px, transparent 1px 100%),
                linear-gradient(90deg, rgba(84,116,151,.18) 0 1px, transparent 1px 100%),
                radial-gradient(circle at 50% 48%, rgba(107,157,255,.24), transparent 34%),
                #0c141d;
            background-size: 46px 46px, 46px 46px, auto, auto;
        }
        model-viewer {
            position: absolute;
            inset: -14px -10px 34px;
            width: auto;
            height: auto;
            filter: drop-shadow(0 54px 62px rgba(0,0,0,.48));
        }
        .target {
            position: absolute;
            right: 118px;
            top: 350px;
            width: 76px;
            height: 76px;
            border: 1px solid rgba(255,255,255,.34);
            border-radius: 50%;
            background: rgba(255,255,255,.05);
        }
        .camera {
            position: absolute;
            right: 42px;
            bottom: 44px;
            padding: 18px 20px;
            border: 1px solid rgba(255,255,255,.16);
            border-radius: 16px;
            background: rgba(7,10,15,.76);
            box-shadow: 0 18px 46px rgba(0,0,0,.35);
        }
        .camera small {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,.38);
            font-size: 12px;
            letter-spacing: .14em;
            text-transform: uppercase;
        }
        .camera b { font-size: 18px; font-weight: 500; }
        .meter { margin-bottom: 24px; color: rgba(255,255,255,.66); font-size: 16px; }
        .meter span {
            display: block;
            overflow: hidden;
            height: 6px;
            margin-top: 12px;
            border-radius: 999px;
            background: rgba(255,255,255,.12);
        }
        .meter i { display: block; height: 100%; border-radius: inherit; background: #80aaff; }
        .pill {
            margin-top: 11px;
            padding: 12px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,.08);
            color: rgba(255,255,255,.72);
            font-size: 15px;
        }
    </style>
</head>
<body>
<div class="shot">
    <div class="brandline"><b>Scene Director</b><span>AI-assisted 3D Web Builder</span></div>
    <div class="app">
        <div class="bar"><b>voyage_intro.scene</b><span>Camera Point 03</span><i>Export JSON</i></div>
        <div class="workspace">
            <aside class="side left">
                <span class="label">Scene</span>
                <div class="row active">Camera_Main</div>
                <div class="row">Caravel_Ship</div>
                <div class="row">Compass</div>
                <div class="row">Cannon_Right</div>
                <div class="row">Mist_Layer</div>
            </aside>
            <main class="canvas">
                <model-viewer src="assets/scene/caravel.glb" alt="Caravel ship GLB preview" camera-orbit="38deg 66deg 7m" field-of-view="31deg" exposure="0.92" shadow-intensity="0.75" auto-rotate auto-rotate-delay="0" rotation-per-second="16deg"></model-viewer>
                <div class="target"></div>
                <div class="camera"><small>Camera output</small><b>x 4.2 · y 1.8 · z 7.6</b></div>
            </main>
            <aside class="side right">
                <span class="label">Transform</span>
                <div class="meter">Position X<span><i style="width:68%"></i></span></div>
                <div class="meter">Rotation Y<span><i style="width:42%"></i></span></div>
                <div class="meter">Dolly Speed<span><i style="width:76%"></i></span></div>
                <span class="label">Preset</span>
                <div class="pill">Scroll dolly</div>
                <div class="pill">Focus object</div>
            </aside>
        </div>
    </div>
</div>
</body>
</html>
